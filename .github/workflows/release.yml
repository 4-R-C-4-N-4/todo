name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── 1. Quality gate ──────────────────────────────────────────────────────────
  ci:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint & format check
        run: npm run lint

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm test

  # ── 2. Build native binaries ─────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: ci
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - target: linux-x64
            pkg_target: node18-linux-x64
            artifact: todo-linux-x64
          - target: macos-arm64
            pkg_target: node18-macos-arm64
            artifact: todo-macos-arm64
          - target: macos-x64
            pkg_target: node18-macos-x64
            artifact: todo-macos-x64
          - target: windows-x64
            pkg_target: node18-win-x64
            artifact: todo-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      # pkg compiles Node 18 binaries and works correctly under Node 18
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bundle with esbuild
        run: npm run bundle

      - name: Install pkg (compile-time only, not in package.json)
        run: npm install -g @yao-pkg/pkg

      - name: Compile binary (${{ matrix.target }})
        run: |
          pkg dist/bundle.js \
            --targets ${{ matrix.pkg_target }} \
            --output dist/${{ matrix.artifact }} \
            --compress GZip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 1

  # ── 3. Create GitHub release ─────────────────────────────────────────────────
  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      # Flatten artifact subdirs into a single dir
      - name: Collect binaries
        run: |
          mkdir -p release/
          find dist/ -type f -exec cp {} release/ \;
          ls -lh release/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          cat <<'EOF' > release_notes.md
          ## Installation

          Download the binary for your platform, make it executable, and move it to your PATH.

          **Linux / macOS:**
          ```bash
          # Linux x64
          curl -Lo todo https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/todo-linux-x64
          chmod +x todo && sudo mv todo /usr/local/bin/

          # macOS Apple Silicon (arm64)
          curl -Lo todo https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/todo-macos-arm64
          chmod +x todo && sudo mv todo /usr/local/bin/

          # macOS Intel (x64)
          curl -Lo todo https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/todo-macos-x64
          chmod +x todo && sudo mv todo /usr/local/bin/
          ```

          **Windows (PowerShell):**
          ```powershell
          Invoke-WebRequest -Uri "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/todo-windows-x64.exe" -OutFile todo.exe
          # Move todo.exe somewhere on your PATH
          ```

          **npm (requires Node 18+):**
          ```bash
          npm install -g @4-r-c-4-n-4/todo
          ```

          ## Getting started

          ```bash
          cd your-git-repo
          todo init
          todo new "First ticket" --type chore --source human
          ```

          See [BIBLE.md](https://github.com/${{ github.repository }}/blob/main/BIBLE.md) for the full workflow guide.
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
