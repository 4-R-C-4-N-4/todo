name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── 1. Quality gate ──────────────────────────────────────────────────────────
  ci:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint & format check
        run: npm run lint

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm test

  # ── 2. Build native binaries via Node SEA ───────────────────────────────────
  #
  # Node 22 SEA (Single Executable Applications) embeds the JS bundle and the
  # Node runtime into one binary. Cross-compilation is not supported — each
  # platform must build on its own native runner.
  #
  build:
    name: Build (${{ matrix.name }})
    needs: ci

    strategy:
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            artifact: todo-linux-x64

          - name: macos-arm64
            os: macos-latest        # GitHub-hosted macOS runners are arm64
            artifact: todo-macos-arm64

          - name: macos-x64
            os: macos-13            # macos-13 is the last Intel runner
            artifact: todo-macos-x64

          - name: windows-x64
            os: windows-latest
            artifact: todo-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bundle with esbuild
        run: npm run bundle

      # ── Linux / macOS ──────────────────────────────────────────────────────
      - name: Build SEA binary (Unix)
        if: runner.os != 'Windows'
        run: |
          # Generate the SEA blob
          node --experimental-sea-config sea-config.json

          # Copy the node binary and inject the blob
          cp "$(which node)" dist/${{ matrix.artifact }}
          npx postject dist/${{ matrix.artifact }} NODE_SEA_BLOB dist/sea-prep.blob \
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2

          chmod +x dist/${{ matrix.artifact }}

      # ── Windows ────────────────────────────────────────────────────────────
      - name: Build SEA binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Generate the SEA blob
          node --experimental-sea-config sea-config.json

          # Copy node.exe and inject the blob
          $nodePath = (Get-Command node).Source
          Copy-Item $nodePath dist\${{ matrix.artifact }}
          npx postject dist\${{ matrix.artifact }} NODE_SEA_BLOB dist\sea-prep.blob `
            --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2 `
            --overwrite

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 1

  # ── 3. Create GitHub release ─────────────────────────────────────────────────
  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Collect binaries
        run: |
          mkdir -p release/
          find dist/ -type f -exec cp {} release/ \;
          ls -lh release/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          cat <<'EOF' > release_notes.md
          ## Installation

          Download the binary for your platform, make it executable, and move it to your PATH.

          **Linux x64:**
          ```bash
          curl -Lo todo https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/todo-linux-x64
          chmod +x todo && sudo mv todo /usr/local/bin/
          ```

          **macOS Apple Silicon (arm64):**
          ```bash
          curl -Lo todo https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/todo-macos-arm64
          chmod +x todo && sudo mv todo /usr/local/bin/
          ```

          **macOS Intel (x64):**
          ```bash
          curl -Lo todo https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/todo-macos-x64
          chmod +x todo && sudo mv todo /usr/local/bin/
          ```

          **Windows (PowerShell):**
          ```powershell
          Invoke-WebRequest -Uri "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/todo-windows-x64.exe" -OutFile todo.exe
          # Move todo.exe somewhere on your PATH
          ```

          **npm (requires Node 22+):**
          ```bash
          npm install -g @4-r-c-4-n-4/todo
          ```

          > Binaries are built with [Node SEA](https://nodejs.org/api/single-executable-applications.html) — no dependencies required on the target machine.

          ## Getting started

          ```bash
          cd your-git-repo
          todo init
          todo new "First ticket" --type chore --source human
          ```

          See [BIBLE.md](https://github.com/${{ github.repository }}/blob/main/BIBLE.md) for the full workflow guide.
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
